name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup dotnet 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build Binaries
        run: make bundle
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          working_directory: builds
          body: Release tag ${{ github.ref_name }}
          files: archives/*.zip