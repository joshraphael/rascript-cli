name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            6.0.x
            10.0.x
      - name: Build Binaries
        run: make bundle
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          working_directory: builds
          body: Release tag ${{ github.ref_name }}
          files: archives/*.zip